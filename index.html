<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f4f1e9" />
  <title>Jamil & Gabriela · 01.08.2026</title>
  <meta name="description" content="Nos casamos. Te invitamos a acompañarnos — Jamil & Gabriela, 01 de agosto del 2026, Samborondón, Ecuador." />

  <!-- Open Graph / WhatsApp / iMessage preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Jamil & Gabriela · Nos casamos" />
  <meta property="og:description" content="01 de agosto del 2026 · Samborondón, Ecuador. Toca para abrir nuestra invitación." />
  <meta property="og:image" content="assets/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/og-image.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Decorative falling petals -->
  <div class="petals" id="petals" aria-hidden="true"></div>

  <!-- Story progress bars -->
  <div class="progress" id="progress" aria-hidden="true"></div>

  <!-- Music toggle (shown only if a track is configured) -->
  <button class="music-btn" id="music-btn" type="button" aria-label="Música" hidden>
    <span class="music-ico" id="music-ico">♪</span>
  </button>

  <!-- ===================== DECK ===================== -->
  <div class="swiper deck" id="deck">
    <div class="swiper-wrapper" id="wrapper">

      <!-- 1 · Portada -->
      <div class="swiper-slide">
        <div class="card">
          <picture>
            <source srcset="assets/pages/page1.webp" type="image/webp" />
            <img class="page" src="assets/pages/page1.jpg" alt="Jamil & Gabriela" fetchpriority="high" />
          </picture>
          <div class="hint" id="hint">
            <span>desliza o toca para continuar</span>
            <span class="hint-chev">⌄</span>
          </div>
        </div>
      </div>

      <!-- 2 · Mensaje -->
      <div class="swiper-slide">
        <div class="card">
          <picture>
            <source srcset="assets/pages/page2.webp" type="image/webp" />
            <img class="page" src="assets/pages/page2.jpg" alt="Después de muchos sueños, risas y momentos compartidos…" loading="lazy" />
          </picture>
        </div>
      </div>

      <!-- 3 · Detalles + acciones -->
      <div class="swiper-slide">
        <div class="card">
          <picture>
            <source srcset="assets/pages/page3.webp" type="image/webp" />
            <img class="page" src="assets/pages/page3.jpg" alt="Boda Civil · Sábado 01 de agosto del 2026 · 16:30 · Samborondón" loading="lazy" />
          </picture>
          <div class="actionbar">
            <div class="countdown" id="countdown" aria-live="polite">
              <div class="cd-cell"><b id="cd-d">--</b><span>días</span></div>
              <div class="cd-cell"><b id="cd-h">--</b><span>hrs</span></div>
              <div class="cd-cell"><b id="cd-m">--</b><span>min</span></div>
              <div class="cd-cell"><b id="cd-s">--</b><span>seg</span></div>
            </div>
            <div class="btn-row">
              <button class="btn" id="btn-map" type="button">📍 Cómo llegar</button>
              <button class="btn" id="btn-cal" type="button">📅 Agendar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 4 · Dress code -->
      <div class="swiper-slide">
        <div class="card">
          <picture>
            <source srcset="assets/pages/page4.webp" type="image/webp" />
            <img class="page" src="assets/pages/page4.jpg" alt="Dress code · Formal Elegante" loading="lazy" />
          </picture>
        </div>
      </div>

      <!-- 5 · RSVP -->
      <div class="swiper-slide">
        <div class="card">
          <picture>
            <source srcset="assets/pages/page5.webp" type="image/webp" />
            <img class="page" src="assets/pages/page5.jpg" alt="Confirma tu asistencia antes del 15 de julio del 2026" loading="lazy" />
          </picture>
          <div class="actionbar">
            <button class="btn btn-primary" id="btn-rsvp" type="button">Confirmar asistencia</button>
          </div>
        </div>
      </div>

      <!-- 6 · Galería (se inserta por JS si hay fotos) -->
      <!-- 7 · Video (se inserta por JS si hay enlace) -->

    </div>
  </div>

  <!-- Tap zones for story-style navigation -->
  <div class="tapzone tap-left" id="tap-left" aria-hidden="true"></div>
  <div class="tapzone tap-right" id="tap-right" aria-hidden="true"></div>

  <!-- ===================== INTRO (sobre / wax seal) ===================== -->
  <div class="intro" id="intro">
    <div class="intro-inner">
      <div class="envelope" id="envelope">
        <div class="env-flap"></div>
        <div class="env-body"></div>
        <div class="env-seal" id="seal">
          <span class="seal-initials"></span>
        </div>
      </div>
      <p class="intro-names"></p>
      <p class="intro-sub">Nos casamos · 01.08.2026</p>
      <button class="intro-open" id="intro-open" type="button">Abrir invitación</button>
    </div>
  </div>

  <!-- ===================== RSVP MODAL ===================== -->
  <div class="modal" id="rsvp-modal" aria-hidden="true">
    <div class="modal-card">
      <button class="modal-close" id="rsvp-close" type="button" aria-label="Cerrar">×</button>
      <div class="modal-body" id="rsvp-body">
        <h2 class="script">Confirma tu</h2>
        <h3 class="serif-caps">asistencia</h3>
        <p class="muted" id="rsvp-deadline"></p>
        <form id="rsvp-form" novalidate>
          <label>Nombre y apellido
            <input type="text" name="nombre" required placeholder="Tu nombre" />
          </label>
          <label>¿Asistirás?
            <div class="seg" role="radiogroup">
              <label class="seg-opt"><input type="radio" name="asiste" value="Sí, asistiré" checked /><span>Sí 🎉</span></label>
              <label class="seg-opt"><input type="radio" name="asiste" value="No podré asistir" /><span>No podré</span></label>
            </div>
          </label>
          <label>Número de invitados (incluyéndote)
            <input type="number" name="invitados" min="1" max="10" value="1" />
          </label>
          <label>Mensaje para los novios (opcional)
            <textarea name="mensaje" rows="2" placeholder="Un buen deseo…"></textarea>
          </label>
          <button class="btn btn-primary btn-block" type="submit" id="rsvp-submit">Enviar confirmación</button>
        </form>
      </div>
      <div class="modal-success" id="rsvp-success" hidden>
        <div class="success-heart">♥</div>
        <h3 class="serif-caps">¡Gracias!</h3>
        <p class="muted">Se abrió WhatsApp con tu confirmación.<br/>Solo presiona enviar. ¡Nos vemos el 01 de agosto! 💛</p>
        <button class="btn" id="rsvp-done" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- ===================== LIGHTBOX ===================== -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lb-close" type="button" aria-label="Cerrar">×</button>
    <button class="lb-nav lb-prev" id="lb-prev" type="button" aria-label="Anterior">‹</button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <button class="lb-nav lb-next" id="lb-next" type="button" aria-label="Siguiente">›</button>
  </div>

  <!-- ===================== VIDEO MODAL ===================== -->
  <div class="modal video-modal" id="video-modal" aria-hidden="true">
    <button class="modal-close" id="video-close" type="button" aria-label="Cerrar">×</button>
    <div class="video-frame" id="video-frame"></div>
  </div>

  <audio id="bg-audio" loop preload="none"></audio>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/rsvp.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
